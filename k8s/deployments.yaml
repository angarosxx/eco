apiVersion: apps/v1
kind: Deployment
metadata:
  name: eco-web-deployment
  namespace: eco-prod
  labels:
    app: eco-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eco-web
  template:
    metadata:
      labels:
        app: eco-web
    spec:
      containers:
      - name: web-app
        image: ghcr.io/angarosxx/eco:latest 
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: APACHE_DOCUMENT_ROOT
          value: "/var/www/html/public"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: eco-marketplace-secrets
              key: db-host
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: eco-marketplace-secrets
              key: db-name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: eco-marketplace-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: eco-marketplace-secrets
              key: db-pass
        - name: DB_PORT
          value: "3306"
        - name: DB_SSL
          value: "false" # 🔒 Desactivado para permitir texto plano interno hacia el bridge
---
apiVersion: v1
kind: Service
metadata:
  name: eco-web-service
  namespace: eco-prod
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30083
  selector:
    app: eco-web
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eco-web-ingress
  namespace: eco-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "ECO_STICKY_SESSION"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
spec:
  rules:
  - host: www.ecomercio.cl
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: eco-web-service
            port:
              number: 80
  - host: ecomercio.cl
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: eco-web-service
            port:
              number: 80