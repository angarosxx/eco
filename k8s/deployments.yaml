apiVersion: apps/v1
kind: Deployment
metadata:
  name: eco-web-deployment
  namespace: eco-prod
  labels:
    app: eco-web
spec:
  replicas: 2 # High availability redundancy
  selector:
    matchLabels:
      app: eco-web
  template:
    metadata:
      labels:
        app: eco-web
    spec:
      containers:
      - name: web-app
        # Pulls the image built by your GitHub action workflow
        image: ghcr.io/angarosxx/eco:latest 
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        # 🔥 FIJACIÓN DE LA RAÍZ DE APACHE PARA EVITAR LOS 404
        - name: APACHE_DOCUMENT_ROOT
          value: "/var/www/html/public"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: eco-marketplace-secrets
              key: db-host
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: eco-marketplace-secrets
              key: db-name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: eco-marketplace-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: eco-marketplace-secrets
              key: db-pass
        - name: DB_PORT
          value: "3306"
        - name: DB_SSL
          value: "true" # <--- FIXED: Changes encryption state to match your plain-text internal ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: eco-web-service
  namespace: eco-prod
spec:
  type: NodePort # 🔥 CHANGE THIS FROM ClusterIP
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30083 # 🔥 FORCE IT TO LOCK TO YOUR PROXY'S PORT
  selector:
    app: eco-web # This must match your deployment template labels
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eco-web-ingress
  namespace: eco-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m" # Supports large image uploads for ads
    # 🍪 STICKY SESSIONS: Mantiene al usuario en el mismo Pod para no perder la sesión de PHP
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "ECO_STICKY_SESSION"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
spec:
  rules:
  - host: www.ecomercio.cl
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: eco-web-service
            port:
              number: 80
  - host: ecomercio.cl
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: eco-web-service
            port:
              number: 80