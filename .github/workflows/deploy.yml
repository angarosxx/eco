name: CI/CD Build and Deploy Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # --- Compilar Tailwind desde el Runner de GitHub ---
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node Dependencies and Build CSS
        run: |
          npm install
          npm run build
          # Asegurar que exista la carpeta destino dentro de web/ antes de copiar
          mkdir -p web/public/css
          # Copia el CSS generado en la raíz hacia el contexto de Docker
          cp -r public/css/* web/public/css/ 2>/dev/null || true

      # --- Registro e inicio de Docker en GHCR ---
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata Info
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and Push Shared Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-marketplace:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Kubernetes Context Manually
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply your base configurations globally inside your k8s folder
        run: |
          kubectl apply -f k8s/secrets.yaml
          kubectl replace --force -f k8s/deployments.yaml