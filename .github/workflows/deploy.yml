name: Build and Deploy Eco Marketplace

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: angarosxx/eco

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./web
        file: ./web/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-to-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Kubeconfig Context
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        # Store your K8s Master cluster config file inside your GitHub Repo Secrets as KUBECONFIG
        kubeconfig: ${{ secrets.KUBECONFIG }} 

    - name: Deploy Manifests to Kubernetes
      uses: azure/k8s-deploy@v4
      with:
        manifests: |
          k8s/secrets.yaml
          k8s/deployments.yaml
        images: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        action: deploy